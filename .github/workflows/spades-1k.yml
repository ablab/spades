name: SPAdes 1k test

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
  workflow_dispatch:

env:
  BUILD_TYPE: RelWithDebInfo

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: '⚙️ Update deps'
        run: |
             if [ "$RUNNER_OS" == "Linux" ]; then
               sudo apt-get update
             elif [ "$RUNNER_OS" == "macOS" ]; then
               brew update
             fi
        shell: bash

      - name: '🧰 Checkout repository'
        uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 1

      - name: '⚙️ Setup ccache'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}
          variant: sccache

      - name: '⚙️ Configure CMake'
        run: |
          cmake -B ${{github.workspace}}/build -S ${{github.workspace}}/assembler/src -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/install -DCMAKE_C_COMPILER_LAUNCHER=sccache -D CMAKE_CXX_COMPILER_LAUNCHER=sccache
        shell: bash

      - name: '🚧 Build SPAdes'
        run: |
          cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j8
        shell: bash

      - name: '🚧 Install SPAdes'
        run: |
          cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
        shell: bash

      - name: '🧫 Multi-cell mode check'
        working-directory: ${{github.workspace}}/install
        run: bin/spades.py --test

      - name: '🧬 Single-cell mode check'
        working-directory: ${{github.workspace}}/install
        run: bin/spades.py --sc --test

      - name: '🧫 Isolate mode check'
        working-directory: ${{github.workspace}}/install
        run: bin/spades.py --isolate --test

      - name: '🧪 Metagenomic mode check'
        working-directory: ${{github.workspace}}/install
        run: bin/metaspades.py --test

      - name: '⭕ Plasmid mode check'
        working-directory: ${{github.workspace}}/install
        run: bin/plasmidspades.py --test

      - name: '🧪 RNA mode check'
        working-directory: ${{github.workspace}}/install
        run: bin/rnaspades.py --test

      - name: '🦠 RNA viral mode check'
        working-directory: ${{github.workspace}}/install
        run: bin/rnaviralspades.py --test
